[build]
builder = "nixpacks"
buildCommand = "npm run build"

[build.nixpacks]
# Reduce npm timeout issues in Docker
ccacheSize = "2G"
enableCoreutils = true

[deploy]
startCommand = "npm run start:railway"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[[deploy.environmentVariables]]
name = "NODE_ENV"
value = "production"

[[deploy.environmentVariables]]
name = "NPM_CONFIG_PRODUCTION"
value = "false"

# ============================================================
# CONFIGURACIÓN REQUERIDA EN RAILWAY DASHBOARD
# ============================================================
# Ve a tu proyecto Railway → Settings → Variables y configura:
#
# 1. JWT_SECRET (obligatorio)
#    Valor: genera una clave de 32+ caracteres
#    Ej: openssl rand -hex 32
#
# 2. FIREBASE_SERVICE_ACCOUNT_JSON (obligatorio)
#    Formato: pegar el JSON completo del service account de Firebase
#    (desde Firebase Console > Configuración > Cuentas de servicio)
#
# 3. CORS_ORIGIN (recomendado)
#    Valor: URL de tu app en Railway
#    Ej: https://minimarketinnova-production.up.railway.app
#
# 4. APP_URL (recomendado)
#    Valor: misma URL de Railway
#    Ej: https://minimarketinnova-production.up.railway.app
#
# Opcionales:
# - FIREBASE_SERVICE_ACCOUNT_BASE64 (alternativa a SERVICE_ACCOUNT_JSON)
# - RESEND_API_KEY (para emails de activación)
# - REACT_APP_FIREBASE_* (solo si usas Firebase Web SDK)
#
# ⚠️ NO necesitas MONGO_URI — tu backend usa Firebase Firestore
# ============================================================
