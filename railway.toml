[build]
builder = "nixpacks"
buildCommand = "npm run build"

[build.nixpacks]
# Reduce npm timeout issues in Docker
ccacheSize = "2G"
enableCoreutils = true

[deploy]
startCommand = "npm run start:railway"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[[deploy.environmentVariables]]
name = "NODE_ENV"
value = "production"

[[deploy.environmentVariables]]
name = "NPM_CONFIG_PRODUCTION"
value = "false"

# IMPORTANTE: Configura estas variables en el dashboard de Railway
# Variables requeridas:
# MONGO_URI=tu_uri_de_mongodb_atlas_aqui
# JWT_SECRET=tu_clave_secreta_segura_aqui