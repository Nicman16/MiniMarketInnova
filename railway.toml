[build]
builder = "nixpacks"
buildCommand = "npm run build"

[build.nixpacks]
# Reduce npm timeout issues in Docker
ccacheSize = "2G"
enableCoreutils = true

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[[deploy.environmentVariables]]
name = "NODE_ENV"
value = "production"

[[deploy.environmentVariables]]
name = "NPM_CONFIG_PRODUCTION"
value = "false"

# MongoDB Database Service
[[services.mongodb]]
image = "mongo:7"
restartPolicyType = "always"
healthcheckPath = "/health"
healthcheckTimeout = 300

[[services.mongodb.environmentVariables]]
name = "MONGO_INITDB_ROOT_USERNAME"
value = "admin"

[[services.mongodb.environmentVariables]]
name = "MONGO_INITDB_ROOT_PASSWORD"
value = "password123"

[[services.mongodb.environmentVariables]]
name = "MONGO_INITDB_DATABASE"
value = "minimarket"

# Conectar la app con MongoDB
[[deploy.environmentVariables]]
name = "MONGO_URI"
value = "mongodb://admin:password123@mongodb:27017/minimarket?authSource=admin"

[[deploy.environmentVariables]]
name = "JWT_SECRET"
value = "minimarket_jwt_secret_2024_secure_key_change_in_production"